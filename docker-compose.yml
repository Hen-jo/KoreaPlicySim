services:
  koreapolicysim:
    image: ghcr.io/666ghj/koreapolicysim:latest
    # Mirror image (use this if pulling the default image is slow)
    # image: ghcr.nju.edu.cn/666ghj/koreapolicysim:latest
    container_name: koreapolicysim
    env_file:
      - .env
    ports:
      - "3000:3000"
      - "5001:5001"
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/backend/uploads
